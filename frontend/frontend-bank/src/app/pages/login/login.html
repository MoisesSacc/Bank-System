<div class="login-container">

    <mat-card class="login-card">

        <h1>Grupo Financiero Altiora</h1>
        <p>Ingresa tu correo y contraseña</p>

        <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
        </div>

        <form>

            <mat-form-field appearance="outline">

                <mat-label>Correo</mat-label>

                <input matInput type="email" [(ngModel)]="correo" name="correo" [disabled]="isLoading">

            </mat-form-field>

            <mat-form-field appearance="outline">

                <mat-label>Contraseña</mat-label>

                <input matInput type="password" [(ngModel)]="password" name="password" [disabled]="isLoading">

            </mat-form-field>

            <button class="login-button" (click)="login()" [disabled]="isLoading">
                {{ isLoading ? 'Cargando...' : 'Iniciar sesión' }}
            </button>

        </form>

    </mat-card>

</div>
